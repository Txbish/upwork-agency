<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 320px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #1a1a2e;
        background: #f8f9fb;
        padding: 16px;
      }
      h2 {
        font-size: 15px;
        margin-bottom: 12px;
        color: #0f172a;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 4px;
        color: #475569;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 10px;
        outline: none;
      }
      input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
      }
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-primary {
        background: #6366f1;
        color: #fff;
        width: 100%;
      }
      .btn-primary:hover {
        background: #4f46e5;
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #334155;
      }
      .btn-secondary:hover {
        background: #cbd5e1;
      }
      .error {
        color: #dc2626;
        font-size: 12px;
        margin-top: -4px;
        margin-bottom: 8px;
      }
      .user-status {
        padding: 10px;
        background: #eef2ff;
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 13px;
        color: #3730a3;
      }
      .settings {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #e2e8f0;
      }
      .settings label {
        font-size: 11px;
        color: #94a3b8;
      }
      .settings input {
        font-size: 12px;
        padding: 6px 8px;
      }
      .settings .row {
        display: flex;
        gap: 6px;
        align-items: flex-start;
      }
      .settings .row input {
        flex: 1;
        margin-bottom: 0;
      }
      .settings .row button {
        padding: 6px 10px;
        font-size: 12px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h2>AOP Upwork Integration</h2>

    <div id="login-section" style="display: none">
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@aop.local" required />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required />
        <div id="login-error" class="error"></div>
        <button type="submit" class="btn-primary">Log in</button>
      </form>
    </div>

    <div id="status-section" style="display: none">
      <div class="user-status" id="user-info">Checking...</div>
      <button id="logout-btn" class="btn-secondary">Log out</button>
    </div>

    <div class="settings">
      <label for="api-url">API URL</label>
      <div class="row">
        <input type="url" id="api-url" placeholder="http://localhost:3001/api" />
        <button id="save-url-btn" class="btn-secondary">Save</button>
      </div>
    </div>

    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
